name: Android CI

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

jobs:
  test:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Appium
        run: npm install -g appium@latest

      - name: Install Appium drivers
        run: appium driver install uiautomator2 --force

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: |
            appium --log-level info &
            sleep 30
            ./gradlew connectedAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=ru.netology.testing.uiautomator.appium.AppTests